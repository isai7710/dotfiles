# ---- General ----
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"         # truecolor for modern terminals (Ghostty/Kitty/Alacritty)
set -s escape-time 0                        # no delay after Esc (matters a lot for Neovim)
set -g focus-events on                      # let Neovim autoread + focus events work under tmux
set -g history-limit 50000                  # generous scrollback (default 2000 is tiny)
set -g mouse on                             # enable mouse support
set -g base-index 1                         # windows start at 1
setw -g pane-base-index 1                   # panes start at 1
set -g renumber-windows on                  # no numbering gaps when a window closes
set -g set-clipboard on                     # yanks reach the system clipboard (OSC 52)

# --- Remap prefix ('C-b' -> 'C-a') ---
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ---- Reload Config ----
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

# ---- Copy mode: Vim-style, yank to macOS clipboard ----
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# ---- Window panes: Vim-style navigation ----
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# ---- Splits / new windows open in the current path ----
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window     -c "#{pane_current_path}"
unbind '"'
unbind %

# ---- Aliases & session management ----
set -s command-alias[10] rw='rename-window'
set -s command-alias[11] rs='rename-session'
# Kill the current session with prefix + X, with a confirmation prompt
bind-key X confirm-before -p "Kill session #S? (y/n)" kill-session

# ---- Blank second status line (visual spacing above the prompt) ----
set -Fg 'status-format[1]' '#{status-format[0]}'
set -g 'status-format[1]' ''
set -g status 2

#--------------- Manual Catppuccin Theme Install -------------------------
# follow the manual installation steps here: https://github.com/catppuccin/tmux
set -g @catppuccin_flavor 'macchiato'
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
#-----------------------------------------------------------------

# --- Status Line Formatting ---
set -g status-position top
set -g status-style "bg=default,fg=#{@thm_fg}"
set -g status-justify centre
set -g status-left-length 100
set -g status-right-length 100
setw -g window-status-separator "   "
set -g status-left "#[fg=#{@thm_maroon},bold] 󰣙 #S #[fg=#{@thm_surface_1}] #[default]"
set -g status-interval 30
set -g status-right "#[fg=#{@thm_red},bold]󰃰 %Y-%m-%d %H:%M #[fg=#{@thm_surface_1}]| #[fg=#{@thm_green}]#(~/.config/tmux/scripts/battery.sh) "

# Inactive windows
setw -g window-status-format "#[fg=#{@thm_lavender}]#[bg=#{@thm_lavender},fg=#{@thm_crust},italics]#I:#[bg=default,fg=#{@thm_lavender},italics] #W"

# Active (current) window
setw -g window-status-current-format "#[fg=#{@thm_mauve}]#[bg=#{@thm_mauve},fg=#{@thm_crust},noitalics]#I:#[bg=default,fg=#{@thm_mauve},noitalics,bold] #W"
